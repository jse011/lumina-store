<!doctype html>

<html class="dark scroll-smooth" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Lumina Recuerdos | Inmortalidad Digital</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries">
        function changeImage(mainId, newSrc, btn, counterId, index, total) {
            const mainImg = document.getElementById(mainId);

            // Add a fade effect
            mainImg.style.opacity = '0.4';

            setTimeout(() => {
                mainImg.src = newSrc;
                mainImg.style.opacity = '1';
            }, 150);

            // Handle thumbnail active state
            const container = btn.parentElement;
            const buttons = container.getElementsByTagName('button');
            for (let b of buttons) {
                b.classList.remove('thumbnail-active');
            }
            btn.classList.add('thumbnail-active');

            // Update counter
            if (counterId) {
                document.getElementById(counterId).innerText = `${index} / ${total}`;
            }
        }
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <style>
        body {
            background-color: #050b18;
            color: #e0e3e5;
        }

        .glass-panel {
            backdrop-filter: blur(20px);
            border: 1px solid rgba(34, 211, 238, 0.1);
            background: rgba(16, 20, 21, 0.6);
        }

        .holographic-glow {
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.15);
        }

        .scan-line {
            background: linear-gradient(to bottom,
                    transparent 50%,
                    rgba(34, 211, 238, 0.05) 50%);
            background-size: 100% 4px;
        }

        .material-symbols-outlined {
            font-variation-settings:
                "FILL" 0,
                "wght" 400,
                "GRAD" 0,
                "opsz" 24;
        }

        .thumbnail-active {
            border-color: #00dbe7 !important;
            box-shadow: 0 0 10px rgba(0, 219, 231, 0.3);
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#c0c6d9",
                        "on-primary": "#2a303f",
                        secondary: "#d0bcff",
                        tertiary: "#00dbe7",
                        background: "#050B18",
                        surface: "#101415",
                        "on-surface-variant": "#c6c6cc",
                    },
                    fontFamily: {
                        display: ["Space Grotesk"],
                        body: ["Manrope"],
                    },
                },
            },
        };
    </script>
</head>

<body class="font-body text-on-background selection:bg-tertiary selection:text-on-tertiary">
    <button
        class="bg-gradient-to-r from-tertiary to-secondary text-on-primary font-display font-bold py-4 px-10 rounded-xl transition-all uppercase tracking-widest text-xs hover:shadow-[0_0_20px_rgba(34,211,238,0.4)] active:scale-95"
        onclick="
                document
                  .getElementById('error-modal')
                  .classList.remove('hidden')
              ">
        Validar
    </button>

    <script>
        function changeImage(mainId, newSrc, btn, counterId, index, total) {
            const mainImg = document.getElementById(mainId);

            // Add a fade effect
            mainImg.style.opacity = "0.4";

            setTimeout(() => {
                mainImg.src = newSrc;
                mainImg.style.opacity = "1";
            }, 150);

            // Handle thumbnail active state
            const container = btn.parentElement;
            const buttons = container.getElementsByTagName("button");
            for (let b of buttons) {
                b.classList.remove("thumbnail-active");
            }
            btn.classList.add("thumbnail-active");

            // Update counter
            if (counterId) {
                document.getElementById(counterId).innerText = `${index} / ${total}`;
            }
        }
    </script>

    <!-- Incorrect Code Modal -->
    <div class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-[#050B18]/80 backdrop-blur-md"
        id="error-modal">
        <div
            class="glass-panel max-w-md w-full rounded-[2rem] p-8 border-red-500/30 holographic-glow shadow-[0_0_50px_rgba(239,68,68,0.15)] text-center space-y-6 relative overflow-hidden">
            <!-- Red glow accent -->
            <div class="absolute -top-24 -left-24 w-48 h-48 bg-red-500/10 blur-[80px] pointer-events-none"></div>
            <div class="relative">
                <div
                    class="w-20 h-20 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-6 border border-red-500/20 shadow-[0_0_20px_rgba(239,68,68,0.2)]">
                    <span class="material-symbols-outlined text-red-500 text-5xl">shield_with_heart</span>
                </div>
                <h3 class="font-display text-2xl text-white font-bold mb-4">
                    Código Incorrecto o No Válido
                </h3>
                <p class="text-on-surface-variant text-sm leading-relaxed mb-6">
                    El código ingresado no se encuentra en nuestro sistema o ya ha sido
                    utilizado. Por seguridad, se ha limitado el número de intentos.
                </p>
                <div class="bg-red-500/5 border border-red-500/10 rounded-xl p-4 mb-8">
                    <p class="text-red-400 font-display text-xs uppercase tracking-widest font-bold">
                        Reintento disponible en:
                    </p>
                    <p class="text-white font-display text-2xl font-bold mt-1 tracking-tighter">
                        04:59
                    </p>
                </div>
                <button
                    class="w-full bg-gradient-to-r from-red-500/80 to-amber-500/80 text-white font-display font-bold py-4 rounded-xl transition-all uppercase tracking-widest text-xs hover:shadow-[0_0_20px_rgba(239,68,68,0.4)] active:scale-[0.98]"
                    onclick="
              document.getElementById('error-modal').classList.add('hidden')
            ">
                    Entendido
                </button>
            </div>
        </div>
    </div>

</body>

</html>
